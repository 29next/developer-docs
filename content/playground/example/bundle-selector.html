<!--
title: Bundle Selector
description: Static bundle cards where each unit can have its own color / size. "configurable": true expands a quantity-N item into N independent slots, each with its own variant controls.
order: 2
layout: center
-->

<!--
  HOW THIS WORKS:
  ─────────────────────────────────────────────────────────────────────────────
  BundleSelectorEnhancer (data-next-bundle-selector):
    Registers every [data-next-bundle-card] inside it.
    Selecting a card replaces the previous bundle's packages in the cart with
    the new bundle's packages, leaving unrelated cart items untouched.

  ── STATIC CARD MODE ─────────────────────────────────────────────────────────
    Write bundle cards directly in HTML. Useful when each card needs unique
    markup, or when combining slot rendering with static card structure.

    Each card needs:
      data-next-bundle-card         — marks the card
      data-next-bundle-id           — unique bundle identifier (your choice of value)
      data-next-bundle-items        — JSON array of {packageId, quantity, configurable?}

  ── PER-ITEM SLOT TEMPLATES (variant selectors) ───────────────────────────────
    data-next-bundle-slot-template-id="<id>"
      ID of a <template> rendered once per slot. When configurable: true, a
      quantity-N item expands into N individual slots with independent controls.
      Slot template variables:
        {slot.index}                — 1-based slot number (unique across all slots)
        {slot.unitNumber}           — 1-based unit index within a configurable item
        {item.packageId}            — current package ref_id
        {item.name}                 — package name
        {item.image}                — package image URL
        {item.quantity}             — quantity for this slot
        {item.qty}                  — units per package
        {item.variantName}          — variant display name (e.g. "Black / S")
        {item.productName}          — product name
        {item.sku}                  — product SKU
        Campaign prices (before offer discounts):
        {item.price}                — per-unit price
        {item.priceTotal}           — total package price
        {item.priceRetail}          — retail per-unit price
        {item.priceRetailTotal}     — retail total price
        API prices (reflect applied offer/coupon discounts):
        {item.unitPrice}            — per-unit price after discounts
        {item.originalUnitPrice}    — per-unit price before discounts
        {item.packagePrice}         — package total after discounts
        {item.originalPackagePrice} — package total before discounts
        {item.totalDiscount}        — total discount on this line
        {item.total}                — line total after all discounts
        {item.hasDiscount}          — "show" / "hide"
        {item.hasSavings}           — "show" / "hide"

      Place data-next-variant-selectors inside the template where variant
      controls (dropdowns or swatches) should be injected.

    data-next-variant-option-template-id="<id>"  (optional)
      Template for a single variant option (e.g. a swatch button).
      Omit to use default <select> dropdowns.
      Option template variables:
        {option.value}     — option value (e.g. "Red")
        {option.selected}  — "true" / "false"
        {option.available} — "true" / "false" — false when no package exists for
                             this value combined with other currently-selected attrs
      CSS class next-variant-selected and data-selected="true" are set on
      the currently selected option element.
      CSS class next-variant-unavailable and data-unavailable="true" are set on
      options with no matching package. Clicks on these are ignored by the SDK.
      Default <select> mode: unavailable options receive the HTML `disabled` attr.

    Place data-next-bundle-slots inside a bundle card to mark where per-item
    slot rows are injected.

  ── MULTI-CURRENCY ───────────────────────────────────────────────────────────
    All prices shown by data-next-bundle-price and the slot template variables
    ({item.unitPrice}, {item.originalUnitPrice}, etc.) are automatically
    recalculated whenever the active currency changes.

    Currency is resolved in this priority order:
      1. ?currency=GBP URL parameter
      2. next_selected_currency sessionStorage value (set by the currency picker)
      3. Auto-detected from visitor's country (when currencyBehavior="auto")

    Use the currency selector in the debug overlay to preview different
    currencies while building — no code changes required.

  ── CART SUMMARY WITH LINE ITEMS ─────────────────────────────────────────────
    data-summary-list="lines" inside a data-next-cart-summary <template>
    renders one row per SummaryLine from the API, enriched with package data.

    Line template variables:
      {line.packageId}            — package ref_id
      {line.quantity}             — cart quantity
      {line.name}                 — package display name
      {line.image}                — product image URL
      {line.qty}                  — units per package
      {line.productName}          — product name
      {line.variantName}          — variant display name (e.g. "Black / S")
      {line.sku}                  — product SKU
      {line.price}                — per-unit price (campaign)
      {line.priceTotal}           — total package price (campaign)
      {line.priceRetail}          — retail per-unit price
      {line.priceRetailTotal}     — retail total price
      {line.unitPrice}            — per-unit price after discounts (API)
      {line.originalUnitPrice}    — per-unit price before discounts (API)
      {line.packagePrice}         — package total after discounts (API)
      {line.originalPackagePrice} — package total before discounts (API)
      {line.subtotal}             — line subtotal
      {line.totalDiscount}        — total discount on this line
      {line.total}                — line total after all discounts
      {line.hasDiscount}          — "show" / "hide"
      {line.hasSavings}           — "show" / "hide"

  Item fields:
    packageId    (required) — package ref_id
    quantity     (required) — number of units
    configurable (optional) — when true, quantity > 1 is expanded into
                              individual slots so each unit can have its own
                              variant selection.

  SDK-managed attributes / CSS classes on each card:
    data-next-selected="true/false"
    .next-selected  — currently selected bundle
    .next-in-cart   — all bundle items present in cart at required qty
  ─────────────────────────────────────────────────────────────────────────────
-->

<meta name="next-api-key" content="GurP7pB3TCs8btWy6YutzhVtBmlE0mP0lsQwmwOP"> 
<meta name="next-clear-cart" content="true">

<div class="package-selector real-content">

  <div class="selector-layout">
  <div class="selector-left">

  <!--
    Page heading — use <h1> only if this is the primary heading on the page.
    Change to <h2> if there is a parent heading in your theme layout.
  -->
  <h1 class="selector-heading">Choose Your Bundle</h1>
  <p class="selector-subtitle">Pick a size &amp; color for every unit — mix &amp; match freely.</p>


  <!--
    ── SLOT TEMPLATE ──────────────────────────────────────────────────────────
    Rendered once per slot (one per unit when configurable: true).

    {slot.unitNumber} → "Unit 1", "Unit 2" etc. for expanded multi-unit items.
    {item.image}, {item.productName}, {item.unitPrice} are replaced by the SDK.

    data-next-variant-selectors is a placeholder — the SDK replaces it with
    either <select> dropdowns (default) or your custom variant-option-template.

    NOTE: The template ID must match data-next-bundle-slot-template-id below.
  -->
  <template id="bundle-slot-template">
    <div class="slot-row">
      <img class="slot-img" src="{item.image}" alt="{item.name}" />
      <div class="slot-info">
        <p class="slot-name">{item.productName}</p>
        <!-- The SDK injects variant controls (dropdowns or swatches) here -->
        <div class="slot-selectors" data-next-variant-selectors></div>
      </div>
      <div class="slot-pricing">
        <!--
          {item.hasDiscount} resolves to "show" or "hide" (CSS class).
          The ::after pseudo-element draws a diagonal red line through the price
          instead of text-decoration:line-through, which allows the diagonal angle.
          See .slot-price-original::after in the CSS for details.
        -->
        <span class="slot-price-original {item.hasDiscount}">{item.originalUnitPrice}</span>
        <span class="slot-price">{item.unitPrice}</span>
      </div>
    </div>
  </template>

  <!--
    ── VARIANT OPTION TEMPLATE (swatch buttons) ───────────────────────────────
    One button is rendered per option value (e.g. "Red", "Blue", "S", "M").
    Omit data-next-variant-option-template-id on the bundle selector to use
    default <select> dropdowns instead of these buttons.

    SDK-managed attributes:
      data-selected="true"          + .next-variant-selected  → active option
      data-available="false"        + .next-variant-unavailable → no matching
                                      package exists for this combination

    data-attr-code="{attr.code}" exposes the attribute axis ("color", "size",
    etc.) so you can style each axis differently — see CSS below.

    --swatch:{option.value} sets a CSS custom property used as the circle
    background color. This works when the option value IS a valid CSS color
    keyword or hex (e.g. "red", "#ff0000").
    ⚠ If option values are names like "Midnight Blue", the swatch circle will
      be transparent. In that case, map values to hex colors in your theme CSS:
        .variant-btn[data-attr-code="color"][data-value="Midnight Blue"]::before
          { background-color: #003366; }

    NOTE: The template ID must match data-next-variant-option-template-id below.
  -->
  <template id="variant-option-template">
    <button class="variant-btn"
            data-selected="{option.selected}"
            data-available="{option.available}"
            data-attr-code="{attr.code}"
            style="--swatch:{option.value}">
      {option.value}
    </button>
  </template>

  <!--
    ── BUNDLE SELECTOR CONTAINER ──────────────────────────────────────────────
    data-next-bundle-selector     — activates BundleSelectorEnhancer on this el
    data-next-selection-mode      — "swap" replaces previous bundle items in cart
    data-next-bundle-slot-template-id   — ID of the per-unit slot <template>
    data-next-variant-option-template-id — ID of the per-option swatch <template>

    role="radiogroup" exposes this as a radio group to screen readers.
    aria-label gives the group an accessible name.
    Note: aria-checked on each card is set to the initial state here.
    For full ARIA sync after SDK selection changes, listen to the
    selector:selection-changed event and update aria-checked in your JS.
  -->
  <div class="package-list"
       role="radiogroup"
       aria-label="Bundle options"
       data-next-bundle-selector
       data-next-selection-mode="swap"
       data-next-bundle-slot-template-id="bundle-slot-template"
       data-next-variant-option-template-id="variant-option-template">

    <!--
      ── BUNDLE CARD: Buy 2 Get 25% Discount ────────────────────────────────────────
      data-next-bundle-id   — unique string key for this bundle (your choice)
      data-next-bundle-items — JSON array describing the packages in this bundle:
        packageId    (required) — campaign package ref_id
        quantity     (required) — how many of this package to add
        configurable (optional) — true: expand each unit into its own slot row
                                   so the customer can pick color/size per unit

      packageId "1" = Next T-Shirt (configurable), "10" = Shipping Insurance (toggle add-on).

      data-next-selected="true" sets this card as the default selection on load.

      ── CLICK OVERLAY PATTERN ────────────────────────────────────────────────
      .card-click-overlay (position:absolute, z-index:1) captures clicks across
      the entire card surface, triggering bundle selection regardless of where
      the user clicks.

      .slots-container has z-index:2 so variant buttons rendered inside it sit
      ABOVE the overlay and receive their own pointer events. Without this, the
      overlay would block variant button clicks.
      ─────────────────────────────────────────────────────────────────────────

      role="radio" + aria-checked exposes selection state to screen readers.
      The SDK adds .next-selected and updates data-next-selected but does NOT
      update aria-checked — update it yourself via the selector:selection-changed
      event if full accessibility compliance is required.
    -->
    <div class="package-card"
         role="radio"
         aria-checked="true"
         data-next-bundle-card
         data-next-bundle-id="buy2"
         data-next-bundle-items='[
           { "packageId": 1, "quantity": 2, "configurable": true }
         ]'
         data-next-selected="true">

      <!--
        Full-card click overlay. z-index:1 sits above the card background but
        below .slots-container (z-index:2), so variant buttons remain clickable.
      -->
      <div class="card-click-overlay"></div>

      <div class="card-header">
        <!-- Visual radio indicator — state driven by .next-selected CSS class -->
        <div class="card-radio" aria-hidden="true"></div>
        <div class="card-content">
          <!--
            Using <p> intentionally — these are not document headings, they are
            labelling UI controls inside a radiogroup. Change to <span> if your
            linter flags <p> inside <p>.
          -->
          <p class="card-title">
            Buy 2 Get 25% Discount
            <!--
              .badge is a pill label for promotions. Use .badge--gold for a
              warm-toned variant (e.g. "Most Popular"). Leave empty to hide it
              — .badge:empty { display:none } handles this automatically.
            -->
            <span class="badge">Best Deal</span>
          </p>
          <p class="card-subtitle">Pick your size &amp; color</p>
        </div>
        <div class="card-pricing">
          <!--
            data-next-bundle-price targets:
              (no value)   — current total price after discounts
              "compare"    — original/retail price (shown with strikethrough)
              "savings"    — amount saved (e.g. "$10.00")
            Prices are updated automatically when currency or cart state changes.
            :empty rules in CSS hide these elements when the SDK leaves them blank.
          -->
          <p class="price-original" data-next-bundle-price="compare"></p>
          <p class="price-current"  data-next-bundle-price></p>
          <p class="price-savings"  data-next-bundle-price="savings"></p>
        </div>
      </div>

      <!--
        Per-unit slot rows are injected here by the SDK using bundle-slot-template.
        z-index:2 ensures variant buttons inside slots sit above .card-click-overlay.
      -->
      <div class="slots-container" data-next-bundle-slots></div>

    </div>

    <!--
      ── BUNDLE CARD: Buy 3 Get 35% Discount ────────────────────────────────────────────────────
      Single non-configurable unit — one slot row, no per-unit expansion.
      aria-checked="false" reflects the unselected initial state.
    -->
    <div class="package-card"
         role="radio"
         aria-checked="false"
         data-next-bundle-card
         data-next-bundle-id="buy3"
         data-next-bundle-items='[
           { "packageId": 1, "quantity": 3, "configurable": true }
         ]'>

      <div class="card-click-overlay"></div>

      <div class="card-header">
        <div class="card-radio" aria-hidden="true"></div>
        <div class="card-content">
          <p class="card-title">Buy 3 Get 35% Discount</p>
          <p class="card-subtitle">Pick your size &amp; color</p>
        </div>
        <div class="card-pricing">
          <p class="price-original" data-next-bundle-price="compare"></p>
          <p class="price-current"  data-next-bundle-price></p>
          <p class="price-savings"  data-next-bundle-price="savings"></p>
        </div>
      </div>

      <div class="slots-container" data-next-bundle-slots></div>

    </div>

  </div><!-- /.package-list -->

    <!--
    ── SHIPPING INSURANCE TOGGLE ────────────────────────────────────
    data-next-toggle adds/removes package 64 on click.
    The SDK adds .next-in-cart / .next-not-in-cart to this element,
    which drives the checkbox visual via CSS (no real <input> needed —
    using a CSS-driven indicator means cart state always wins).
  -->
  <div class="insurance-row"
        role="checkbox"
        aria-checked="false"
        data-next-toggle
        data-next-package-id="10"
        data-next-is-upsell="true"
        data-next-selected="true"
        >
    <span class="insurance-checkbox" aria-hidden="true"></span>
    <span class="insurance-info">
      <svg class="insurance-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      <span class="insurance-text">
        <strong>Shipping Insurance</strong>
        <small>Protect your order against loss or damage</small>
      </span>
    </span>
    <span class="insurance-price" data-next-display="package.price" data-next-package-id="10"></span>
  </div>

  <!--
    Checkout button.
    data-next-action="add-to-cart" — SDK adds the selected bundle to the cart
    data-next-url="/checkout"       — redirect target after the cart API call
    The SDK adds data-next-loading="true" on this element while the API request
    is in flight. Style [data-next-action][data-next-loading="true"] in your CSS
    to show a spinner or disabled state.
  -->
  <button class="btn-checkout"
          data-next-action="add-to-cart"
          data-next-url="/checkout">
    Continue to Checkout
  </button>

  </div><!-- /.selector-left -->

  <!-- ── Cart items + summary (sticky, shown only when cart has items) ──────── -->
  <div class="selector-right">
  <!--
    data-next-show="cart.hasItems" hides this section until at least one item
    is in the cart. The SDK toggles visibility automatically.
  -->
  <div class="order-summary" data-next-show="cart.hasItems">
    <p class="order-summary-heading">Order Summary</p>

    <!--
      data-next-cart-summary wraps the entire summary template.
      The outer <template> is rendered by the SDK on every cart recalculate.
    -->
    <div data-next-cart-summary>
      <template>
        <!--
          ── LINE ITEMS ──────────────────────────────────────────────────────
          data-summary-list="lines" renders one <li> per SummaryLine returned
          by the API calculate response, enriched with local package data.

          Available variables on each line:
            {line.packageId}            — package ref_id
            {line.quantity}             — cart quantity
            {line.name}                 — package display name
            {line.image}                — product image URL
            {line.qty}                  — units per package
            {line.productName}          — product name
            {line.variantName}          — variant display name (e.g. "Black / S")
            {line.sku}                  — product SKU
            {line.price}                — per-unit price (campaign)
            {line.priceTotal}           — total package price (campaign)
            {line.priceRetail}          — retail per-unit price
            {line.priceRetailTotal}     — retail total price
            {line.priceRecurring}       — recurring per-unit price
            {line.priceRecurringTotal}  — recurring total price
            {line.isRecurring}          — "true" / "false"
            {line.unitPrice}            — per-unit price after discounts (API)
            {line.originalUnitPrice}    — per-unit price before discounts (API)
            {line.packagePrice}         — package total after discounts (API)
            {line.originalPackagePrice} — package total before discounts (API)
            {line.subtotal}             — line subtotal
            {line.totalDiscount}        — total discount on this line
            {line.total}                — line total after all discounts
            {line.hasDiscount}          — "show" / "hide"
            {line.hasSavings}           — "show" / "hide"
        -->
        <ul class="cart-lines" data-summary-list="lines">
          <template>
            <li class="cart-item">
              <!--
                onerror hides broken images gracefully (e.g. sandbox / dev env).
                Remove in production if you prefer a placeholder image instead.
              -->
              <img class="cart-item-image" src="{line.image}" alt="{line.name}" onerror="this.style.display='none'">
              <div class="cart-item-info">
                <p class="cart-item-name">{line.quantity}x {line.productName}</p>
                <p class="cart-item-meta">{line.variantName}</p>
              </div>
              <div class="cart-item-price">
                <!--
                  {line.hasSavings} resolves to "show" or "next-hide" (CSS class).
                  Shows the pre-discount price only when savings exist.
                -->
                <span class="price-original {line.hasSavings}">{line.originalPackagePrice}</span>
                <span class="cart-item-final">{line.total}</span>
                <!--
                  {line.hasDiscount} resolves to "show" or "next-hide" (CSS class).
                  Shows the discount amount only when a discount is applied.
                -->
                <span class="price-savings {line.hasDiscount}">{line.totalDiscount}</span>
              </div>
            </li>
          </template>
        </ul>
        <div class="summary-totals">
          <div class="summary-row">
            <span>Subtotal</span>
            <span>{subtotal}</span>
          </div>

          <!--
            data-summary-list="offer_discounts" renders one <li> per offer discount
            (e.g. "10% off"). The SDK adds .next-summary-empty when the list is
            empty, which hides the <ul> via CSS.
          -->
          <ul class="discount-list" data-summary-list="offer_discounts">
            <template>
              <li class="discount-item">
                <span class="discount-name">{discount.name}</span>
                <span class="discount-amount">-{discount.amount}</span>
              </li>
            </template>
          </ul>

          <!--
            data-summary-list="voucher_discounts" renders coupon/voucher discounts
            in a distinct color (.discount-item--voucher) to differentiate from
            automatic offer discounts above.
          -->
          <ul class="discount-list" data-summary-list="voucher_discounts">
            <template>
              <li class="discount-item discount-item--voucher">
                <span class="discount-name">{discount.name}</span>
                <span class="discount-amount">-{discount.amount}</span>
              </li>
            </template>
          </ul>

          <div class="summary-row summary-row--shipping">
            <span>Shipping</span>
            <span class="shipping-price">
              <span class="shipping-original">{shippingOriginal}</span>
              {shipping}
            </span>
          </div>

          <!--
            The SDK adds .next-no-savings to the summary container when savings
            are zero. .summary-row--savings is hidden via the CSS rule:
              .next-no-savings .summary-row--savings { display: none }
          -->
          <div class="summary-row summary-row--savings">
            <span>You save</span>
            <span>{savings}</span>
          </div>

          <div class="summary-row summary-row--total">
            <span>Total</span>
            <span>{total}</span>
          </div>
        </div>
      </template>
    </div>
  </div><!-- /.order-summary -->
  </div><!-- /.selector-right -->

  </div><!-- /.selector-layout -->

</div><!-- /.real-content -->

<!--
  SKELETON: shown while body[data-next-sdk-loading="true"] (SDK initializing).
  Must mirror the exact same grid structure as .real-content so there is no
  layout shift when the SDK swaps skeleton out for real content.
  aria-hidden hides this from screen readers — they will see the real content.
-->
<div class="package-selector skeleton-page" aria-hidden="true">
  <div class="selector-layout">

    <!-- Left column: heading + bundle cards (matches .selector-left) -->
    <div class="selector-left">
      <div class="skeleton-line skeleton-line--title"></div>
      <div class="skeleton-line skeleton-line--sub"></div>
      <div class="skeleton-cards">

        <!-- Card 1: 2-unit configurable bundle (with slot rows) -->
        <div class="skeleton-card">
          <div class="skeleton-card-header">
            <div class="skeleton-circle"></div>
            <div class="skeleton-lines">
              <div class="skeleton-line skeleton-line--sm"></div>
              <div class="skeleton-line skeleton-line--xs"></div>
            </div>
            <div class="skeleton-price-block">
              <div class="skeleton-line skeleton-line--xs"></div>
              <div class="skeleton-line skeleton-line--sm"></div>
            </div>
          </div>
          <!-- Two slot placeholders mirror a 2-unit configurable bundle -->
          <div class="skeleton-slots">
            <div class="skeleton-slot"></div>
            <div class="skeleton-slot"></div>
          </div>
        </div>

        <!-- Card 2: single-unit bundle (no slots) -->
        <div class="skeleton-card">
          <div class="skeleton-card-header">
            <div class="skeleton-circle"></div>
            <div class="skeleton-lines">
              <div class="skeleton-line skeleton-line--sm"></div>
              <div class="skeleton-line skeleton-line--xs"></div>
            </div>
            <div class="skeleton-price-block">
              <div class="skeleton-line skeleton-line--xs"></div>
              <div class="skeleton-line skeleton-line--sm"></div>
            </div>
          </div>
          <!-- Single slot placeholder -->
          <div class="skeleton-slots">
            <div class="skeleton-slot"></div>
          </div>
        </div>

      </div><!-- /.skeleton-cards -->

      <!-- Checkout button placeholder -->
      <div class="skeleton-btn"></div>
    </div><!-- /.selector-left -->

    <!-- Right column: order summary panel (matches .selector-right) -->
    <div class="selector-right">
      <div class="skeleton-card skeleton-summary">
        <div class="skeleton-summary-heading"></div>
        <div class="skeleton-summary-body">
          <div class="skeleton-line skeleton-line--sm"></div>
          <div class="skeleton-line skeleton-line--xs"></div>
          <div class="skeleton-line skeleton-line--sm"></div>
        </div>
      </div>
    </div><!-- /.selector-right -->

  </div><!-- /.selector-layout -->
</div>



<script>
  // Wait for SDK to be fully initialized
  window.addEventListener('next:initialized', function() {
    // console.log('SDK initialized, setting up exit intent...');

    // Set up exit intent popup with discount code
    next.exitIntent({
      image: 'https://placehold.co/600x400',
      action: async () => {
        const result = await next.applyCoupon('EXIT10');
        if (result.success) {
          console.log('Coupon applied successfully:', result.message);
        } else {
          console.log('Failed to apply coupon:', result.message);
        }
      }
    });
  });
</script>

<style>
  /*
    ==============================================================================
    DESIGN TOKENS
    Define all brand colors, radii, and spacing here so a theme developer can
    restyle the entire component by editing only this block.
    ==============================================================================
  */
  :root {
    /* Brand colors */
    --color-primary:        #2563eb; /* blue - selected state, CTA button     */
    --color-primary-dark:   #1d4ed8; /* blue hover                            */
    --color-primary-light:  #eff6ff; /* light blue - selected card background  */
    --color-primary-glow:   rgba(37, 99, 235, 0.15); /* focus ring shadow     */
    --color-success:        #059669; /* green - savings, offer discounts       */
    --color-danger:         #dc2626; /* red - strikethrough line on prices     */
    --color-purple:         #7c3aed; /* voucher discount color                 */

    /* Text */
    --color-text:           #111;
    --color-text-secondary: #374151;
    --color-muted:          #6b7280;
    --color-muted-light:    #9ca3af;

    /* Backgrounds & borders */
    --color-bg:             #f8fafc;
    --color-bg-white:       #ffffff;
    --color-bg-subtle:      #f9fafb;
    --color-border:         #e5e7eb;
    --color-border-light:   #f3f4f6;
    --color-skeleton-base:  #f3f4f6;
    --color-skeleton-shine: #e5e7eb;

    /* Shape */
    --radius-card:   12px;
    --radius-btn:    50px;
    --radius-badge:  20px;
    --radius-slot:    8px;
    --radius-swatch: 50%;
  }

  /*
    -- Playground base styles ------------------------------------------------
    [!]  These rules target <body> and will bleed into your theme if copy-pasted.
    In production, scope these to your page wrapper instead of body.
  */
  body { font-family: sans-serif; background: var(--color-bg); margin: 0; padding: 32px 16px; }

  /* -- Utility -------------------------------------------------------------- */
  /*
    .next-hide is used by SDK template variables that resolve to "next-hide"
    (e.g. {item.hasDiscount}, {line.hasSavings}) when the condition is false.
    Prefixed with "next-" to avoid collisions with Bootstrap, Tailwind, etc.
  */
  .next-hide { display: none !important; }

  .package-selector {
    width: 100%;
    max-width: 860px; margin: 0 auto;
  }

  /*
    -- Two-column layout -----------------------------------------------------
    Left: scrollable bundle cards. Right: sticky order summary panel.
    Falls back to single-column on narrow viewports (see breakpoint below).
  */
  .selector-layout {
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 20px;
    align-items: start;
  }

  .selector-left {
    min-width: 0; /* prevent grid blowout */
    background: var(--color-bg-white); border-radius: 16px; padding: 24px;
  }

  /*
    .selector-right uses position:sticky so the order summary remains visible
    as the user scrolls through bundle options. This works because the parent
    (.selector-layout) is a grid, and sticky is relative to the scroll container.
    Increase top: value if you have a fixed header.
  */
  .selector-right {
    min-width: 0;
    position: sticky;
    top: 24px;
  }

  .selector-heading {
    font-size: 22px; font-weight: 700; color: var(--color-text);
    text-align: center; margin: 0 0 6px;
  }
  .selector-subtitle { font-size: 14px; color: var(--color-muted); text-align: center; margin: 0 0 24px; }

  /* -- Package list -- */
  .package-list { display: flex; flex-direction: column; gap: 10px; }

  /* -- Package card -- */
  .package-card {
    position: relative;
    border: 2px solid var(--color-border);
    border-radius: var(--radius-card);
    background: var(--color-bg-white);
    cursor: pointer;
    transition: border-color .15s, box-shadow .15s;
    user-select: none;
    overflow: hidden;
  }
  .package-card:hover { border-color: var(--color-muted-light); }

  /* SDK adds .next-selected to the active card */
  .package-card.next-selected {
    border-color: var(--color-primary);
    background: var(--color-primary-light);
    box-shadow: 0 0 0 3px var(--color-primary-glow);
  }

  /*
    -- Card click overlay ----------------------------------------------------
    An absolutely-positioned div that covers the entire card surface, making
    the whole card clickable without wrapping interactive children in an <a>
    or <button> (which would be invalid HTML for complex card content).

    z-index:1 sits above the card's background content.
    .slots-container uses z-index:2 so variant buttons rendered inside remain
    above this overlay and still receive pointer events.
  */
  .card-click-overlay {
    position: absolute; inset: 0;
    border-radius: calc(var(--radius-card) - 2px); /* match inner edge */
    cursor: pointer; z-index: 1;
  }

  /* -- Card header -- */
  .card-header {
    display: grid;
    grid-template-columns: 24px 1fr auto;
    align-items: center;
    gap: 16px;
    padding: 16px 20px;
  }

  /*
    -- Radio indicator -------------------------------------------------------
    Pure CSS radio dot - no <input type="radio"> needed because the SDK manages
    selection state via .next-selected on the card.
    aria-hidden="true" is set in the HTML since the radio group semantics are
    carried by role="radio" on the card itself.
  */
  .card-radio {
    width: 20px; height: 20px; border-radius: 50%;
    border: 2px solid var(--color-border); background: var(--color-bg-white);
    flex-shrink: 0; position: relative;
    transition: border-color .15s;
  }
  .package-card.next-selected .card-radio { border-color: var(--color-primary); }
  .card-radio::after {
    content: ''; position: absolute;
    inset: 3px; border-radius: 50%;
    background: var(--color-primary); opacity: 0; transition: opacity .15s;
  }
  .package-card.next-selected .card-radio::after { opacity: 1; }

  /* -- Card content -- */
  .card-title {
    font-size: 15px; font-weight: 600; color: var(--color-text);
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    margin: 0 0 2px;
  }
  .card-subtitle { font-size: 13px; color: var(--color-muted); margin: 0; }

  /*
    -- Promotion badge -------------------------------------------------------
    Default: green ("Best Deal").
    Modifier .badge--gold: warm amber ("Most Popular").
    .badge:empty { display:none } hides the badge when you leave the text blank.
  */
  .badge {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
    padding: 2px 8px; border-radius: var(--radius-badge);
    background: #ecfdf5; color: var(--color-success);
  }
  .badge:empty { display: none; }
  .badge--gold { background: #fefce8; color: #92400e; }

  /* -- Pricing column -- */
  .card-pricing    { text-align: right; white-space: nowrap; }

  /*
    .price-original::after draws a diagonal red line through the compare price.
    We use a pseudo-element instead of text-decoration:line-through so we can
    control the angle (rotate(-10deg)). If you prefer a horizontal strikethrough,
    replace the ::after block with: text-decoration: line-through; color: var(--color-muted-light);
  */
  .price-original  { font-size: 12px; color: var(--color-muted-light); text-decoration: none; margin: 0; position: relative; display: inline-block; }
  .price-original::after {
    content: '';
    position: absolute;
    left: 0; top: 50%; right: 0;
    border-top: 1.5px solid var(--color-danger);
    transform: rotate(-10deg);
    transform-origin: center;
  }
  .price-original:empty { display: none; }
  .price-current   { font-size: 17px; font-weight: 700; color: var(--color-text); margin: 0; }
  .price-per       { font-size: 11px; color: var(--color-muted); margin: 0; }

  /*
    [!] i18n note: "Save " is injected via CSS content - English only.
    To support other languages, remove ::before and include the label in your
    HTML: <p class="price-savings">Save {savings}</p>
  */
  .price-savings   { font-size: 11px; font-weight: 700; color: var(--color-success); margin: 2px 0 0; }
  .price-savings::before { content: "Save "; }
  .price-savings:empty { display: none; }

  /* -- Slot rows -- */
  /*
    .slots-container z-index:2 is critical - it ensures variant buttons rendered
    inside slots sit ABOVE the .card-click-overlay (z-index:1), so they receive
    their own pointer events instead of being blocked by the overlay.
  */
  .slots-container {
    border-top: 1px solid var(--color-border-light);
    padding: 0 20px 12px;
    display: flex;
    flex-direction: column;
    gap: 0;
    position: relative; z-index: 2;
  }

  /* SDK injects a wrapper div.next-bundle-slot around each rendered slot row */
  .next-bundle-slot { padding: 10px 0; border-bottom: 1px solid var(--color-border-light); }
  .next-bundle-slot:last-child { border-bottom: none; }

  .slot-row {
    display: grid;
    grid-template-columns: 44px 1fr auto;
    align-items: center;
    gap: 12px;
  }

  .slot-img { width: 44px; height: 44px; object-fit: cover; border-radius: var(--radius-slot); background: var(--color-border-light); }
  .slot-info { min-width: 0; }
  .slot-name {
    font-size: 13px; font-weight: 600; color: var(--color-text);
    margin: 0 0 6px; display: flex; align-items: center; gap: 6px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  /* .slot-unit-label is an optional pill you can add inside {slot.unitNumber} */
  .slot-unit-label {
    font-size: 11px; font-weight: 500; color: var(--color-muted-light);
    background: var(--color-border-light); border-radius: 10px; padding: 1px 7px;
    white-space: nowrap;
  }
  .slot-pricing { display: flex; flex-direction: column; align-items: flex-end; white-space: nowrap; }
  .slot-price { font-size: 13px; font-weight: 700; color: var(--color-text); margin: 0; }

  /* Same diagonal strikethrough technique as .price-original - see note above */
  .slot-price-original { font-size: 11px; color: var(--color-muted-light); text-decoration: none; position: relative; display: inline-block; }
  .slot-price-original::after {
    content: '';
    position: absolute;
    left: 0; top: 50%; right: 0;
    border-top: 1.5px solid var(--color-danger);
    transform: rotate(-10deg);
    transform-origin: center;
  }
  /* SDK resolves {item.hasDiscount} to "next-hide" when no discount exists */
  .slot-price-original.next-hide,
  .slot-price-original:empty { display: none; }

  /* -- Variant selectors (default <select> mode) -- */
  .slot-selectors { display: flex; flex-wrap: wrap; gap: 6px; }

  /*
    SDK-injected wrapper classes (present in both <select> and swatch modes):
      .next-slot-variant-field - wraps label + control for one attribute axis
      .next-slot-variant-label - axis label text (e.g. "Color:")
      .next-slot-variant-select - the <select> element in default mode
  */
  .next-slot-variant-field { display: flex; align-items: center; gap: 5px; }
  .next-slot-variant-label { font-size: 12px; color: var(--color-muted); }
  .next-slot-variant-select {
    font-size: 12px; padding: 3px 6px;
    border: 1px solid var(--color-border); border-radius: 6px;
    background: var(--color-bg-white); cursor: pointer;
  }

  /*
    -- Custom variant option buttons (swatch mode) ---------------------------
    SDK injects .next-slot-variant-group as the container for swatch buttons
    when data-next-variant-option-template-id is set.

    ::before generates the axis label (e.g. "Color:") from the data-variant-name
    attribute that the SDK sets on the group element - no extra HTML needed.
  */
  .next-slot-variant-group {
    display: flex; flex-wrap: wrap; gap: 4px; align-items: center;
  }
  .next-slot-variant-group::before {
    content: attr(data-variant-name) ":";
    font-size: 11px; color: var(--color-muted-light);
    margin-right: 2px; align-self: center;
    white-space: nowrap;
  }

  .variant-btn {
    font-size: 12px; padding: 3px 10px;
    border: 1.5px solid var(--color-border); border-radius: var(--radius-badge);
    background: var(--color-bg-white); color: var(--color-text-secondary);
    cursor: pointer; transition: border-color .12s, background .12s;
    line-height: 1.4;
  }
  .variant-btn:hover { border-color: var(--color-muted-light); }

  /* Keyboard focus ring - required for WCAG 2.1 AA */
  .variant-btn:focus-visible {
    outline: 2px solid var(--color-primary);
    outline-offset: 2px;
  }

  /*
    SDK sets .next-variant-selected + data-selected="true" on the active option.
    Both selectors are equivalent; the class is more specific for CSS, the
    attribute is useful for JS querySelector.
  */
  .variant-btn.next-variant-selected,
  .variant-btn[data-selected="true"] {
    border-color: var(--color-primary);
    background: var(--color-primary);
    color: white;
  }

  /*
    SDK sets .next-variant-unavailable + data-available="false" when no package
    exists for this option combined with the other selected attributes.
    Clicks on unavailable buttons are ignored by the SDK.
  */
  .variant-btn.next-variant-unavailable,
  .variant-btn[data-available="false"] {
    opacity: 0.5; /* keep above 0.4 for WCAG contrast on small text */
    cursor: not-allowed;
    text-decoration: line-through;
    border-color: var(--color-border);
    background: var(--color-bg-subtle);
    color: var(--color-muted-light);
  }
  .variant-btn.next-variant-unavailable:hover,
  .variant-btn[data-available="false"]:hover {
    border-color: var(--color-border); /* suppress hover effect for unavailable */
  }

  /*
    -- Size pills ------------------------------------------------------------
    Triggered when data-attr-code="size". Square-ish pill with min-width so
    single letters (S, M, L) don't look too narrow.
  */
  .variant-btn[data-attr-code="size"] {
    min-width: 36px; text-align: center;
    border-radius: 6px; padding: 3px 10px;
  }

  /*
    -- Color swatches --------------------------------------------------------
    Triggered when data-attr-code="color". Renders a colored circle before the
    label using the --swatch CSS custom property set inline by the template:
      style="--swatch:{option.value}"

    [!] This works when option values are valid CSS color keywords or hex codes
    (e.g. "red", "#ff0000", "rgb(255,0,0)"). If option values are plain names
    like "Navy Blue", the swatch circle will appear transparent/blank.
    Fix: override background-color per-value in your theme CSS:
      .variant-btn[data-attr-code="color"][data-value="Navy Blue"]::before
        { background-color: #003153; }
    Or use a data attribute map in JS to translate names to hex before render.
  */
  .variant-btn[data-attr-code="color"] {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px 3px 5px;
  }
  .variant-btn[data-attr-code="color"]::before {
    content: '';
    width: 14px; height: 14px; border-radius: var(--radius-swatch); flex-shrink: 0;
    background-color: var(--swatch);
    border: 1.5px solid rgba(0, 0, 0, 0.15);
  }
  /* White border on selected swatch circle so it shows against the blue bg */
  .variant-btn[data-attr-code="color"][data-selected="true"]::before,
  .variant-btn[data-attr-code="color"].next-variant-selected::before {
    border-color: rgba(255, 255, 255, 0.5);
  }

  /* -- Order summary wrapper -- */
  .order-summary {
    background: var(--color-bg-white); border-radius: 16px; overflow: hidden;
    border: 1px solid var(--color-border);
  }
  .order-summary-heading {
    font-size: 12px; font-weight: 700; color: var(--color-muted);
    text-transform: uppercase; letter-spacing: .08em;
    margin: 0; padding: 16px 16px 12px;
    border-bottom: 1px solid var(--color-border);
  }

  /* -- Line items (rendered by data-summary-list="lines") -- */
  .cart-lines {
    list-style: none; margin: 0; padding: 0;
    background: var(--color-bg-white); border-bottom: 1px solid var(--color-border);
  }
  .cart-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; border-bottom: 1px solid var(--color-border-light);
    font-size: 14px; color: var(--color-text-secondary);
  }
  .cart-item:last-child { border-bottom: none; }
  .cart-item-image { width: 48px; height: 48px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }
  .cart-item-info { flex: 1; min-width: 0; }
  .cart-item-name { margin: 0; font-weight: 600; color: var(--color-text); }
  .cart-item-meta { margin: 2px 0 0; font-size: 12px; color: var(--color-muted); }
  .cart-item-price { display: flex; flex-direction: column; align-items: flex-end; white-space: nowrap; align-self: flex-start; }
  .cart-item-final { font-size: 15px; font-weight: 700; color: var(--color-text); }

  /* -- Shipping insurance toggle -- */
  .insurance-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; cursor: pointer;
    margin-top: 16px;
    border: 1px solid var(--color-border);
    border-radius: 10px;
    font-size: 14px; color: var(--color-text-secondary);
    transition: background 0.15s;
    user-select: none;
  }
  .insurance-row:hover { background: var(--color-bg-subtle); }
  /* CSS-driven checkbox — state driven by .next-in-cart from CartToggleEnhancer */
  .insurance-checkbox {
    width: 18px; height: 18px; flex-shrink: 0;
    border: 2px solid var(--color-border); border-radius: 4px;
    background: var(--color-bg-white);
    display: flex; align-items: center; justify-content: center;
    transition: border-color .15s, background .15s;
  }
  .insurance-row.next-in-cart .insurance-checkbox {
    background: var(--color-primary); border-color: var(--color-primary);
  }
  .insurance-row.next-in-cart .insurance-checkbox::after {
    content: ''; display: block;
    width: 4px; height: 8px;
    border: 2px solid white; border-top: none; border-left: none;
    transform: rotate(45deg) translate(-1px, -1px);
  }
  .insurance-icon { width: 20px; height: 20px; flex-shrink: 0; color: var(--color-primary); }
  .insurance-info { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
  .insurance-text { display: flex; flex-direction: column; }
  .insurance-text strong { font-weight: 600; color: var(--color-text); font-size: 13px; }
  .insurance-text small { font-size: 11px; color: var(--color-muted); margin-top: 1px; }
  .insurance-price { font-size: 13px; font-weight: 600; color: var(--color-text); white-space: nowrap; }
  /* Dim the row while the API call is in-flight */
  .insurance-row.next-loading { opacity: 0.5; pointer-events: none; }

  /* -- Totals section -- */
  .summary-totals { padding: 12px 16px; background: var(--color-bg-subtle); }
  .summary-row {
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: 14px; color: var(--color-text-secondary); padding: 5px 0;
  }
  .summary-row--total {
    font-weight: 700; font-size: 16px; color: var(--color-text);
    border-top: 2px solid var(--color-border); margin-top: 4px; padding-top: 10px;
  }
  .summary-row--shipping { font-size: 13px; color: var(--color-muted); }
  .shipping-price { display: flex; align-items: baseline; gap: 6px; }
  .shipping-original {
    font-size: 11px; color: var(--color-muted-light);
    position: relative; display: inline-block;
  }
  .shipping-original::after {
    content: '';
    position: absolute; left: 0; top: 50%; right: 0;
    border-top: 1.5px solid var(--color-danger);
    transform: rotate(-10deg); transform-origin: center;
  }
  .shipping-original:empty { display: none; }
  .summary-row--savings  { font-size: 13px; color: var(--color-success); font-weight: 600; }

  /*
    The SDK adds .next-no-savings to the [data-next-cart-summary] wrapper element
    when the cart has no savings (i.e. no discounts applied). This rule hides the
    "You save" row in that state automatically - no JS needed in your theme.
  */
  .next-no-savings .summary-row--savings { display: none; }

  /* -- Discount lists -- */
  .discount-list { list-style: none; margin: 0; padding: 0; }
  /*
    SDK adds .next-summary-empty to a data-summary-list element when the list
    is empty. Hiding empty lists prevents orphaned separators/spacing.
  */
  .discount-list.next-summary-empty { display: none; }
  .discount-item {
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: 13px; color: var(--color-success); padding: 5px 0;
  }
  /* Voucher discounts use purple to distinguish them from automatic offer discounts */
  .discount-item--voucher { color: var(--color-purple); }
  .discount-name   { font-weight: 500; }
  .discount-amount { font-weight: 600; }

  /*
    ==============================================================================
    SKELETON / LOADING STATES
    ==============================================================================

    Two SDK-provided loading hooks:

    1. body[data-next-sdk-loading="true"]
       Set while the SDK initializes (campaign data fetch, store hydration).
       → Show .skeleton-page, hide .real-content

    2. [data-next-bundle-card][data-next-loading="true"]
       Set on a card while its price is being fetched from the API calculate
       endpoint (e.g. after currency switch or coupon application).
       → Pulse just the price elements on that card. Example:
           [data-next-bundle-card][data-next-loading="true"] .card-pricing { opacity: 0.4; }

    3. [data-next-action][data-next-loading="true"]
       Set on the checkout button while the add-to-cart API call is in flight.
       → Show a spinner or disable the button:
           [data-next-action][data-next-loading="true"] { opacity: 0.6; pointer-events: none; }
    ==============================================================================
  */

  @keyframes shimmer {
    0%   { background-position: -400px 0; }
    100% { background-position:  400px 0; }
  }

  /* Reusable shimmer gradient - applied to all skeleton elements below */
  .skeleton-circle,
  .skeleton-line,
  .skeleton-slot {
    background: linear-gradient(
      90deg,
      var(--color-skeleton-base)  25%,
      var(--color-skeleton-shine) 50%,
      var(--color-skeleton-base)  75%
    );
    background-size: 800px 100%;
    animation: shimmer 1.4s infinite linear;
  }

  /* -- Page-level skeleton visibility -- */
  .skeleton-page  { display: none; }
  .real-content   { display: block; }

  /* Flip visibility while SDK is initializing */
  body[data-next-sdk-loading="true"] .skeleton-page { display: block; }
  body[data-next-sdk-loading="true"] .real-content  { display: none; }

  /* Skeleton card layout mirrors .package-card / .card-header proportions */
  .skeleton-cards { display: flex; flex-direction: column; gap: 10px; }

  .skeleton-card {
    border: 2px solid var(--color-border); border-radius: var(--radius-card);
    background: var(--color-bg-white); overflow: hidden;
  }

  .skeleton-card-header {
    display: grid;
    grid-template-columns: 24px 1fr auto;
    align-items: center;
    gap: 16px;
    padding: 16px 20px;
  }

  .skeleton-circle { width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0; }

  .skeleton-lines { display: flex; flex-direction: column; gap: 6px; }

  .skeleton-price-block { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }

  .skeleton-line { height: 12px; border-radius: 6px; }
  .skeleton-line--title { width: 180px; height: 18px; margin: 0 auto 6px; }
  .skeleton-line--sub   { width: 260px; height: 12px; margin: 0 auto 24px; }
  .skeleton-line--sm    { width: 120px; }
  .skeleton-line--xs    { width:  80px; }

  .skeleton-slots {
    border-top: 1px solid var(--color-border-light);
    padding: 12px 20px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .skeleton-slot { height: 44px; border-radius: var(--radius-slot); }

  /* Checkout button placeholder - matches .btn-checkout height */
  .skeleton-btn {
    height: 50px; border-radius: var(--radius-btn);
    margin-top: 16px;
  }
  .skeleton-btn {
    background: linear-gradient(
      90deg,
      var(--color-skeleton-base)  25%,
      var(--color-skeleton-shine) 50%,
      var(--color-skeleton-base)  75%
    );
    background-size: 800px 100%;
