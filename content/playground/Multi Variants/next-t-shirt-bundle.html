          "badgeClass": "bundle-badge-success",
          "hasSavings": "has-savings",
          "items": [{"packageId":1,"quantity":4,"configurable":true}],
          "vouchers": []

      ]'

      <template>
        <div

                      data-next-variant-options

<script>
  window.addEventListener('next:initialized', function () {
    next.exitIntent({
      image: 'https://placehold.co/600x400',
      action: async () => {
        const result = await next.applyCoupon('SP10D');
        if (result.success) {
          console.log('Coupon applied:', result.message);
        } else {
          console.log('Coupon failed:', result.message);
        }
      },
    });

    // Currency switcher — populate from campaign data and reload with ?currency=<code>
    const campaign = next.getCampaignData && next.getCampaignData();
    const currencies = (campaign && campaign.available_currencies) || [];
    const select = document.querySelector('[data-currency-switcher]');
    const wrap = document.querySelector('[data-currency-switcher-wrap]');
    if (select && wrap && currencies.length > 1) {
      const active = (campaign && campaign.currency) || 'USD';
      select.innerHTML = currencies
        .map(function (c) {
          const selected = c.code === active ? ' selected' : '';
          return '<option value="' + c.code + '"' + selected + '>' + c.label + '</option>';
        })
        .join('');
      wrap.hidden = false;
      select.addEventListener('change', function (e) {
        const url = new URL(window.location.href);
        url.searchParams.set('currency', e.target.value);
        window.location.href = url.toString();
      });
    }
  });
</script>

    font: inherit;
    font-size: 12px;
    font-weight: 600;
    color: var(--color-text-muted);
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-full);
    padding: 6px 12px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition:
      border-color var(--transition),
      color var(--transition);
  }
  .theme-toggle:hover {
    border-color: var(--color-border-strong);
    color: var(--color-text);
  }
  .theme-toggle-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--color-text);
  }
</style>

<script>
  document.addEventListener('click', function (e) {
    var btn = e.target.closest('[data-theme-toggle]');
    if (!btn) return;
    var shop = btn.closest('.shop');
    if (!shop) return;
    shop.dataset.theme = shop.dataset.theme === 'dark' ? 'light' : 'dark';
  });
</script>
