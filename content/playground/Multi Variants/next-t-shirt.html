<!--
title: Next T-Shirt
description: Single T-Shirt with variant + quantity selection
layout: center
order: 1
-->

<meta name="next-api-key" content="Lj41tZAXbaw9H6ZEruZ36w8ExL5sdhkCznBsS5mq" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap"
  rel="stylesheet"
/>

<div class="shop" data-theme="light">
  <div class="shop-toolbar">
    <label class="currency-switcher" hidden data-currency-switcher-wrap>
      <span class="currency-switcher-label">Currency</span>
      <select
        class="currency-switcher-select"
        data-currency-switcher
        aria-label="Change currency"
      ></select>
    </label>
    <button type="button" class="theme-toggle" data-theme-toggle>
      <span class="theme-toggle-dot" aria-hidden="true"></span>
      Toggle theme
    </button>
  </div>

  <div
    hidden
    data-next-selector-id="main"
    data-next-bundle-selector
    data-next-selection-mode="select"
    data-next-bundles='[
      {
        "id": "tshirt",
        "shippingId": "2",
        "items": [{"packageId":1,"quantity":1}],
        "quantity": 1,
        "minQuantity": 1,
        "maxQuantity": 10,
        "vouchers": [],
        "selected": true
      }
    ]'
  >
    <template>
      <div data-next-bundle-card data-next-bundle-id="{bundle.id}" hidden></div>
    </template>
  </div>

  <section class="shop-section">
    <div
      id="bundle-slots-stage"
      class="slot-stage"
      data-next-bundle-slots-for="main"
    >
      <template>
        <div class="slot" data-next-package-id="{item.packageId}">
          <div class="slot-hero">
            <img alt="{item.name}" src="{item.image}" />
          </div>
          <div class="slot-content">
            <div class="slot-title">Next Commerce T-Shirt</div>
            <div class="slot-pricing">
              <div class="price-row">
                <span class="price price-current">{item.unitPrice}</span>
                <span class="price price-suffix">/ea</span>
              </div>
              <div class="price-meta" data-next-show="item.hasDiscount">
                <span class="price-was">Was</span>
                <span class="price price-strike">{item.originalUnitPrice}</span>
                <span class="price-savings">
                  Save <span>{item.discountPercentage}</span>
                </span>
              </div>
            </div>
            <div class="slot-variants">
              <div data-next-variant-selectors>
                <template>
                  <div class="variant-group">
                    <div class="variant-label">{attr.name}</div>
                    <div class="variant-options" data-next-variant-options>
                      <template>
                        <button
                          type="button"
                          class="variant-pill"
                          aria-pressed="{option.selected}"
                        >
                          {option.value}
                        </button>
                      </template>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </div>
        </div>
      </template>
    </div>

    <div class="order-summary">
      <div class="order-summary-lines">
        <div class="order-summary-row">
          <span class="order-summary-label">
            <span data-next-display="bundle.main.unitPrice"></span> /ea
          </span>
          <span
            class="order-summary-value"
            data-next-display="bundle.main.originalPrice"
          ></span>
        </div>
      </div>
      <div class="order-summary-total">
        <span class="order-summary-total-label">Total</span>
        <span
          class="order-summary-total-value"
          data-next-display="bundle.main.price"
        ></span>
      </div>
    </div>

    <div class="buy-row">
      <div class="qty" data-next-bundle-qty-for="main">
        <span class="qty-label">Quantity</span>
        <div class="qty-stepper">
          <button
            type="button"
            class="qty-btn"
            aria-label="Decrease quantity"
            data-next-quantity-decrease
          >−</button>
          <span class="qty-display" data-next-quantity-display>1</span>
          <button
            type="button"
            class="qty-btn"
            aria-label="Increase quantity"
            data-next-quantity-increase
          >+</button>
        </div>
      </div>

      <button
        type="button"
        class="btn-cta"
        data-next-action="add-to-cart"
        data-next-selector-id="main"
      >
        <span class="btn-cta-label">Add to Cart</span>
      </button>
    </div>
  </section>
</div>


<style>
  .shop {
    --color-bg: #f7f7f5;
    --color-surface: #ffffff;
    --color-surface-alt: #f3f2ef;
    --color-border: #e7e5e0;
    --color-border-strong: #cfccc3;
    --color-text: #141413;
    --color-text-muted: #6b6b66;

    --color-primary: #ff6b2c;
    --color-primary-soft: #fff1e9;
    --color-primary-contrast: #ffffff;

    --color-accent: #1f6feb;
    --color-accent-contrast: #ffffff;

    --color-success: #1e8a4a;
    --color-success-soft: #e6f4ec;

    --radius-sm: 8px;
    --radius-md: 14px;
    --radius-lg: 22px;
    --radius-full: 999px;

    --shadow-sm: 0 1px 2px rgba(20, 20, 19, 0.06);
    --shadow-md: 0 8px 22px rgba(20, 20, 19, 0.09);

    --space-1: 4px;
    --space-2: 8px;
    --space-3: 12px;
    --space-4: 16px;
    --space-5: 20px;
    --space-6: 24px;
    --space-8: 32px;

    --font-sans: 'Inter', 'Segoe UI', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    --font-numeric: 'Inter', system-ui, sans-serif;
    --transition: 180ms cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  .shop[data-theme='dark'] {
    --color-bg: #0f0f0e;
    --color-surface: #1a1a18;
    --color-surface-alt: #141413;
    --color-border: #2a2a27;
    --color-border-strong: #3a3a36;
    --color-text: #f7f7f5;
    --color-text-muted: #9a9a93;
    --color-primary-soft: #3a1f10;
    --color-success-soft: #0f2a1a;
  }

  .shop {
    font-family: var(--font-sans);
    color: var(--color-text);
    background: var(--color-bg);
    padding: var(--space-6);
    border-radius: var(--radius-lg);
    max-width: 720px;
    margin: 0 auto;
    display: grid;
    gap: var(--space-6);
  }

  .shop-section { display: grid; gap: var(--space-5); }

  .slot-stage {
    display: grid;
    grid-template-columns: 1fr;
    gap: var(--space-4);
    justify-content: center;
  }

  .slot {
    display: grid;
    grid-template-columns: 260px 1fr;
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    overflow: hidden;
  }
  .slot-hero {
    position: relative;
    width: 100%;
    height: 100%;
    min-height: 260px;
    background: var(--color-surface-alt);
    display: grid;
    place-items: center;
    overflow: hidden;
  }
  .slot-hero img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    padding: var(--space-3);
  }
  .slot-content {
    padding: var(--space-5);
    display: grid;
    gap: var(--space-4);
    align-content: start;
  }
  .slot-title {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.01em;
    line-height: 1.2;
  }

  @media (max-width: 560px) {
    .slot { grid-template-columns: 1fr; }
    .slot-hero {
      aspect-ratio: 4 / 3;
      max-height: 280px;
      min-height: 0;
    }
    .slot-hero img { padding: var(--space-2); }
  }

  @media (max-width: 640px) {
    .shop {
      padding: var(--space-4);
      gap: var(--space-5);
      border-radius: var(--radius-md);
    }
    .shop-section { gap: var(--space-4); }
    .slot-content {
      padding: var(--space-4);
      gap: var(--space-3);
    }
    .slot-title { font-size: 16px; }
    .price-current { font-size: 30px; }
  }

  .slot-pricing {
    display: grid;
    gap: 6px;
    font-family: var(--font-numeric);
    font-variant-numeric: tabular-nums lining-nums;
    font-feature-settings: 'tnum', 'lnum', 'ss01';
  }

  .price-row {
    display: flex;
    align-items: baseline;
    gap: 6px;
  }
  .price-meta {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: var(--space-2);
  }

  .price-current {
    font-size: 36px;
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1;
    color: var(--color-text);
  }
  .price-suffix {
    font-size: 14px;
    font-weight: 500;
    color: var(--color-text-muted);
  }
  .price-was {
    font-size: 12px;
    font-weight: 600;
    color: var(--color-text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .price-strike {
    text-decoration: line-through;
    color: var(--color-text-muted);
    font-size: 14px;
    font-weight: 500;
  }
  .price-savings {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    font-size: 11px;
    font-weight: 700;
    color: #ffffff;
    background: var(--color-success);
    border-radius: var(--radius-full);
    line-height: 1;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .price-savings::before {
    content: '';
    width: 0;
    height: 0;
    border-left: 4px solid transparent;
    border-right: 4px solid transparent;
    border-top: 5px solid currentColor;
  }

  .slot-variants { display: grid; gap: var(--space-3); }

  .variant-group { display: grid; gap: 6px; }
  .variant-label {
    font-size: 11px;
    color: var(--color-text-muted);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .variant-options {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  [data-next-variant-selectors] {
    display: grid;
    gap: var(--space-3);
  }

  .variant-pill {
    font: inherit;
    font-size: 13px;
    font-weight: 500;
    color: var(--color-text);
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-full);
    padding: 5px 12px;
    cursor: pointer;
    transition:
      border-color var(--transition),
      background var(--transition),
      color var(--transition),
      transform var(--transition);
  }
  .variant-pill:hover {
    border-color: var(--color-border-strong);
    transform: translateY(-1px);
  }
  .variant-pill:focus-visible {
    outline: 2px solid var(--color-accent);
    outline-offset: 2px;
  }
  .variant-pill.next-variant-selected {
    background: var(--color-text);
    color: var(--color-bg);
    border-color: var(--color-text);
  }
  .variant-pill.next-variant-unavailable {
    opacity: 0.45;
    text-decoration: line-through;
    cursor: not-allowed;
  }

  .variant-pill[data-next-variant-option='color' i] {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding-left: 6px;
  }
  .variant-pill[data-next-variant-option='color' i]::before {
    content: '';
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--swatch, currentColor);
    box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.12);
    flex-shrink: 0;
  }
  .variant-pill[data-next-variant-value='Gray'   i] { --swatch: #a1a1aa; }
  .variant-pill[data-next-variant-value='White'  i] { --swatch: #ffffff; }
  .variant-pill[data-next-variant-value='White' i]::before {
    box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.35);
  }
  .variant-pill[data-next-variant-value='Black'  i] { --swatch: #111111; }
  .variant-pill[data-next-variant-value='Green'  i] { --swatch: #16a34a; }
  .variant-pill[data-next-variant-value='Blue'   i] { --swatch: #2563eb; }
  .variant-pill[data-next-variant-value='Pink'   i] { --swatch: #ec4899; }
  .variant-pill[data-next-variant-value='Violet' i] { --swatch: #8b5cf6; }
  .variant-pill[data-next-variant-value='Yellow' i] { --swatch: #eab308; }
  .variant-pill[data-next-variant-value='Orange' i] { --swatch: #f97316; }
  .variant-pill[data-next-variant-value='Red'    i] { --swatch: #dc2626; }

  .order-summary {
    display: grid;
    gap: var(--space-2);
    padding: var(--space-4);
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    font-variant-numeric: tabular-nums lining-nums;
    transition: opacity var(--transition);
  }
  .order-summary-lines { display: grid; gap: var(--space-1); }
  .order-summary-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: var(--space-3);
    font-size: 13px;
    color: var(--color-text-muted);
  }
  .order-summary-value { color: var(--color-text); font-weight: 500; }
  .order-summary-total {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: var(--space-3);
    padding-top: var(--space-3);
    border-top: 1px dashed var(--color-border);
  }
  .order-summary-total-label {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--color-text-muted);
  }
  .order-summary-total-value {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--color-text);
  }

  .buy-row {
    display: grid;
    grid-template-columns: auto 1fr;
    align-items: end;
    gap: var(--space-3);
  }
  @media (max-width: 560px) {
    .buy-row { grid-template-columns: 1fr; gap: var(--space-3); }
    .qty { width: 100%; }
    .qty-stepper { display: flex; width: 100%; }
    .qty-btn { flex: 0 0 56px; }
    .qty-display { flex: 1 1 auto; width: auto; }
    .btn-cta { width: 100%; }
  }

  .qty { display: grid; gap: 6px; }
  .qty-label {
    font-size: 11px;
    color: var(--color-text-muted);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .qty-stepper {
    display: inline-flex;
    align-items: stretch;
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-full);
    overflow: hidden;
    height: 48px;
  }
  .qty-btn {
    font: inherit;
    width: 40px;
    font-size: 18px;
    font-weight: 600;
    color: var(--color-text);
    background: transparent;
    border: 0;
    cursor: pointer;
    transition: background var(--transition);
  }
  .qty-btn:hover { background: var(--color-surface-alt); }
  .qty-btn:focus-visible {
    outline: 2px solid var(--color-accent);
    outline-offset: -2px;
  }
  .qty-display {
    display: grid;
    place-items: center;
    font-size: 16px;
    font-weight: 600;
    min-width: 44px;
    padding: 0 var(--space-2);
    text-align: center;
    border-left: 1px solid var(--color-border);
    border-right: 1px solid var(--color-border);
    color: var(--color-text);
    font-variant-numeric: tabular-nums;
    user-select: none;
  }

  .btn-cta {
    position: relative;
    font: inherit;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.01em;
    color: var(--color-primary-contrast);
    background: var(--color-primary);
    border: 0;
    border-radius: var(--radius-full);
    height: 48px;
    padding: 0 var(--space-5);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: var(--space-2);
    transition:
      transform var(--transition),
      box-shadow var(--transition),
      background var(--transition);
  }
  .btn-cta:hover {
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
  }
  .btn-cta:active { transform: translateY(0); }
  .btn-cta:focus-visible {
    outline: 2px solid var(--color-primary);
    outline-offset: 3px;
  }
  .btn-cta[disabled],
  .btn-cta.next-disabled { opacity: 0.7; cursor: progress; }

  .shop-toolbar {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: var(--space-2);
    margin-bottom: calc(var(--space-4) * -1);
  }

  .currency-switcher {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 600;
    color: var(--color-text-muted);
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-full);
    padding: 4px 4px 4px 12px;
    transition: border-color var(--transition), color var(--transition);
  }
  .currency-switcher:hover,
  .currency-switcher:focus-within {
    border-color: var(--color-border-strong);
    color: var(--color-text);
  }
  .currency-switcher-label {
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-size: 10px;
  }
  .currency-switcher-select {
    font: inherit;
    font-size: 12px;
    font-weight: 600;
    color: inherit;
    background: var(--color-surface-alt);
    border: 0;
    border-radius: var(--radius-full);
    padding: 4px 10px;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    font-variant-numeric: tabular-nums;
  }
  .currency-switcher-select:focus-visible {
    outline: 2px solid var(--color-accent);
    outline-offset: 2px;
  }

  .theme-toggle {
    font: inherit;
    font-size: 12px;
    font-weight: 600;
    color: var(--color-text-muted);
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-full);
    padding: 6px 12px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: border-color var(--transition), color var(--transition);
  }
  .theme-toggle:hover { border-color: var(--color-border-strong); color: var(--color-text); }
  .theme-toggle-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--color-text);
  }
</style>

<script>
  document.addEventListener('click', function (e) {
    var btn = e.target.closest('[data-theme-toggle]');
    if (!btn) return;
    var shop = btn.closest('.shop');
    if (!shop) return;
    shop.dataset.theme = shop.dataset.theme === 'dark' ? 'light' : 'dark';
  });

  window.addEventListener('next:initialized', function () {
    // Currency switcher — populate from campaign data, reload with ?currency=<code>
    var campaign = next.getCampaignData && next.getCampaignData();
    var currencies = (campaign && campaign.available_currencies) || [];
    var select = document.querySelector('[data-currency-switcher]');
    var wrap = document.querySelector('[data-currency-switcher-wrap]');
    if (select && wrap && currencies.length > 1) {
      var active = (campaign && campaign.currency) || 'USD';
      select.innerHTML = currencies
        .map(function (c) {
          var selected = c.code === active ? ' selected' : '';
          return '<option value="' + c.code + '"' + selected + '>' + c.label + '</option>';
        })
        .join('');
      wrap.hidden = false;
      select.addEventListener('change', function (e) {
        var url = new URL(window.location.href);
        url.searchParams.set('currency', e.target.value);
        window.location.href = url.toString();
      });
    }
  });
</script>
