<!--
title: Next Care Bundles
description: Three skincare kits — Starter, Essential, Complete. Bundle selector in swap mode; auto-applies 25/35/50% volume offer plus FREEMASK voucher on Essential & Complete.
layout: center
order: 2
-->

<meta name="next-api-key" content="i9XyvHjUDEIzn2W1kmXCCG5SjnbKs1XfO6X5fQzV" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
  rel="stylesheet"
/>

<div class="shop real-content" data-theme="light" data-next-await>

  <!-- Toolbar -->
  <div class="shop-toolbar">
    <label class="currency-switcher" hidden data-currency-switcher-wrap>
      <span class="currency-switcher-label">Currency</span>
      <select class="currency-switcher-select" data-currency-switcher aria-label="Change currency"></select>
    </label>
    <button type="button" class="theme-toggle" data-theme-toggle>
      <span class="theme-toggle-dot" aria-hidden="true"></span>
      Theme
    </button>
  </div>

  <!-- Header -->
  <header class="page-head">
    <h1 class="page-title">Build your glow</h1>
    <p class="page-sub">Three kits, one simple glow-up. Free shipping · 60-day guarantee.</p>
  </header>

  <!-- Kit selector — swap mode with inline card template -->
  <div
    class="bundle-grid"
    role="radiogroup"
    aria-label="Choose your skincare kit"
    data-next-bundle-selector
    data-next-selection-mode="swap"
    data-next-bundle-slot-template-id="slot-tpl"
    data-next-bundles='[
      {
        "id": "starter",
        "shippingId": "1",
        "title": "Starter",
        "subtitle": "Cleanse + glow essentials",
        "supply": "60-day supply",
        "image": "/assets/mockup/Next%20Skincare%20Starter.png",
        "items": [
          {"packageId": 1, "quantity": 2},
          {"packageId": 2, "quantity": 2},
          {"packageId": 5, "quantity": 4}
        ],
        "vouchers": ["FREEMASK"]
      },
      {
        "id": "essential",
        "shippingId": "1",
        "title": "Essential",
        "subtitle": "Full AM + PM ritual",
        "supply": "90-day supply",
        "badge": "Most Popular",
        "image": "/assets/mockup/Next%20Skincare%20Essential.png",
        "items": [
          {"packageId": 1, "quantity": 3},
          {"packageId": 2, "quantity": 3},
          {"packageId": 3, "quantity": 3},
          {"packageId": 5, "quantity": 6}
        ],
        "selected": "true",
        "vouchers": ["FREEMASK"]
      },
      {
        "id": "complete",
        "shippingId": "1",
        "title": "Complete",
        "subtitle": "The full 5-step routine",
        "supply": "120-day supply",
        "badge": "Best Value",
        "image": "/assets/mockup/Next%20Skincare%20Complete.png",
        "items": [
          {"packageId": 1, "quantity": 4},
          {"packageId": 2, "quantity": 4},
          {"packageId": 3, "quantity": 4},
          {"packageId": 4, "quantity": 4},
          {"packageId": 5, "quantity": 12}
        ],
        "vouchers": ["FREEMASK"]
      }
    ]'
  >
    <template>
      <article
        class="bundle-card"
        data-next-bundle-card
        data-next-bundle-id="{bundle.id}"
        data-next-selected="{bundle.selected}"
        role="radio"
        aria-checked="false"
        tabindex="0"
      >
        <div class="bundle-badge" data-badge="{bundle.badge}">{bundle.badge}</div>

        <div class="bundle-media">
          <img class="bundle-image" src="{bundle.image}" alt="{bundle.title}" loading="lazy" />
          <span class="bundle-tag">{bundle.supply}</span>
        </div>

        <div class="bundle-body">
          <h3 class="bundle-title">
            {bundle.title}
            <span class="bundle-discount" data-next-bundle-display="discountPercentage"></span>
          </h3>
          <p class="bundle-subtitle">{bundle.subtitle}</p>

          <div class="price">
            <div class="price-row">
              <span class="price-now" data-next-bundle-display="price"></span>
              <span class="price-strike" data-next-bundle-display="originalPrice"></span>
            </div>
            <span class="price-save" data-next-bundle-display="discountAmount"></span>
            <div class="chips">
              <div class="chips-group" data-next-discounts="offer">
                <template><span class="chip chip--offer">{discount.name}</span></template>
              </div>
              <div class="chips-group" data-next-discounts="voucher">
                <template><span class="chip chip--voucher">{discount.name}</span></template>
              </div>
            </div>
          </div>

          <div class="items" data-next-bundle-slots></div>

          <!-- Click bubbles to the card → bundle selector swaps the kit
               items into the cart, then the anchor navigates to /checkout. -->
          <a class="cta" href="/checkout">
            Buy now
          </a>
        </div>
      </article>
    </template>
  </div>

  <!--
    Slot template — one instance per item in bundle.items.
    `data-next-show="item.hasDiscount"` hides strike + save on undiscounted items.
    Free vs price swap is done after render by a MutationObserver (see script).
  -->
  <template id="slot-tpl">
    <div class="item">
      <div class="item-thumb">
        <img class="item-image" src="{item.image}" alt="{item.productName}" loading="lazy" />
        <span class="item-qty">x{item.quantity}</span>
      </div>
      <div class="item-info">
        <p class="item-product">{item.name}</p>
        <p class="item-name">{item.productName}</p>
      </div>
      <div class="item-price-block">
        <span class="item-price-now">{item.unitPrice}/ea</span>
        <span class="item-price-strike" data-next-show="item.hasDiscount">{item.originalUnitPrice}/ea</span>
      </div>
    </div>
  </template>

</div>

<script>
  window.addEventListener('next:initialized', function () {
    next.exitIntent({
      image: 'https://placehold.co/600x400',
      action: async () => {
        const result = await next.applyCoupon('DEMOSK10');
        if (result.success) {
          console.log('Coupon applied:', result.message);
        } else {
          console.log('Coupon failed:', result.message);
        }
      },
    });

    // Currency switcher — populate from campaign data and reload with ?currency=<code>
    const campaign = next.getCampaignData && next.getCampaignData();
    const currencies = (campaign && campaign.available_currencies) || [];
    const select = document.querySelector('[data-currency-switcher]');
    const wrap = document.querySelector('[data-currency-switcher-wrap]');
    if (select && wrap && currencies.length > 1) {
      const active = (campaign && campaign.currency) || 'USD';
      select.innerHTML = currencies
        .map(function (c) {
          const selected = c.code === active ? ' selected' : '';
          return '<option value="' + c.code + '"' + selected + '>' + c.label + '</option>';
        })
        .join('');
      wrap.hidden = false;
      select.addEventListener('change', function (e) {
        const url = new URL(window.location.href);
        url.searchParams.set('currency', e.target.value);
        window.location.href = url.toString();
      });
    }
  });
</script>
<script>
  document.addEventListener('click', function (e) {
    var btn = e.target.closest('[data-theme-toggle]');
    if (!btn) return;
    var shop = btn.closest('.shop');
    if (!shop) return;
    shop.dataset.theme = shop.dataset.theme === 'dark' ? 'light' : 'dark';
  });
</script>

<style>
  .shop {
    --bg: #fbf9fd;
    --surface: #ffffff;
    --surface-alt: #f6f3fa;
    --border: #ece6f2;
    --border-strong: #d2c8de;

    --text: #1a1527;
    --text-dim: #52495f;
    --text-muted: #8b8397;

    --primary: #6d28d9;
    --primary-dark: #5b21b6;
    --primary-soft: #f1ebfe;
    --primary-ring: rgba(109, 40, 217, 0.15);

    --success: #047857;
    --success-soft: #e6f4ee;

    --accent: #db2777;
    --accent-soft: #fce7f1;

    --r-sm: 8px;
    --r-md: 14px;
    --r-lg: 20px;
    --r-full: 999px;

    --shadow-sm: 0 2px 8px rgba(26, 21, 39, 0.05);
    --shadow-md: 0 10px 28px rgba(26, 21, 39, 0.08);
    --shadow-lg: 0 20px 50px -12px rgba(109, 40, 217, 0.28);

    --ease: 180ms cubic-bezier(0.2, 0.8, 0.2, 1);
    --font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }

  .shop[data-theme="dark"] {
    --bg: #13111a;
    --surface: #1a1726;
    --surface-alt: #211d30;
    --border: #2a2540;
    --border-strong: #3d3557;
    --text: #f3effa;
    --text-dim: #c0b7d0;
    --text-muted: #8880a0;
    --primary-soft: #2a1f4d;
    --success-soft: #0c2a20;
    --accent-soft: #3a1a2b;
  }

  /* ─── Shell ───────────────────────────────────────────── */
  .shop {
    font-family: var(--font);
    color: var(--text);
    background: var(--bg);
    padding: 32px;
    border-radius: var(--r-lg);
    max-width: 1080px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: minmax(0, 1fr);
    gap: 28px;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  @media (max-width: 640px) {
    .shop { padding: 20px; gap: 20px; border-radius: var(--r-md); }
  }

  /* ─── Toolbar ─────────────────────────────────────────── */
  .shop-toolbar {
    display: flex; justify-content: flex-end; gap: 8px;
    margin-bottom: -12px;
  }
  .currency-switcher, .theme-toggle {
    display: inline-flex; align-items: center; gap: 6px;
    font: inherit; font-size: 12px; font-weight: 500;
    color: var(--text-muted);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-full);
    padding: 6px 12px;
    cursor: pointer;
    transition: border-color var(--ease), color var(--ease);
  }
  .currency-switcher { padding: 4px 4px 4px 12px; }
  .currency-switcher:hover, .currency-switcher:focus-within, .theme-toggle:hover {
    border-color: var(--border-strong); color: var(--text);
  }
  .currency-switcher-label {
    text-transform: uppercase; letter-spacing: 0.06em; font-size: 10px;
  }
  .currency-switcher-select {
    font: inherit; font-size: 12px; font-weight: 600; color: inherit;
    background: var(--surface-alt); border: 0;
    border-radius: var(--r-full); padding: 4px 10px;
    cursor: pointer; appearance: none; -webkit-appearance: none;
  }
  .theme-toggle-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--primary);
  }

  /* ─── Header ──────────────────────────────────────────── */
  .page-head {
    display: grid; gap: 6px;
    text-align: center;
    padding: 8px 0 0;
  }
  .page-title {
    font-size: clamp(28px, 3.4vw, 36px);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin: 0;
  }
  .page-sub {
    font-size: 14px;
    color: var(--text-muted);
    margin: 0;
  }

  /* ─── Bundle grid ─────────────────────────────────────── */
  .bundle-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 16px;
    align-items: stretch;
  }
  @media (max-width: 820px) {
    .bundle-grid { grid-template-columns: minmax(0, 1fr); }
  }

  .bundle-card {
    position: relative;
    display: flex;
    flex-direction: column;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--r-lg);
    overflow: hidden;
    cursor: pointer;
    transition: border-color var(--ease), transform var(--ease), box-shadow var(--ease);
    min-width: 0;
  }
  .bundle-card:hover {
    border-color: var(--border-strong);
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
  }
  .bundle-card:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
  .bundle-card.next-selected {
    border-color: var(--primary);
    box-shadow: 0 0 0 4px var(--primary-ring), var(--shadow-sm);
  }

  /* ─── Badge (Most Popular / Best Value) ───────────────── */
  .bundle-badge {
    position: absolute; top: 12px; left: 12px; z-index: 2;
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 4px 10px;
    border-radius: var(--r-full);
    color: var(--primary);
    background: var(--primary-soft);
    white-space: nowrap;
  }
  .bundle-badge:empty,
  .bundle-badge[data-badge=""] { display: none; }

  /* ─── Media ───────────────────────────────────────────── */
  .bundle-media {
    position: relative;
    aspect-ratio: 4 / 3;
    background:
      radial-gradient(ellipse 90% 70% at 50% 55%, rgba(109, 40, 217, 0.10), transparent 70%),
      var(--surface-alt);
    display: grid; place-items: center;
    overflow: hidden;
  }
  .shop[data-theme="dark"] .bundle-media {
    background:
      radial-gradient(ellipse 90% 70% at 50% 55%, rgba(109, 40, 217, 0.25), transparent 70%),
      var(--surface-alt);
  }
  .bundle-image {
    width: 100%; height: 100%;
    object-fit: cover;
    padding: 14px;
    filter: drop-shadow(0 8px 16px rgba(109, 40, 217, 0.18));
    transition: transform 400ms cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  .bundle-card:hover .bundle-image { transform: scale(1.04); }

  /* Supply line — subtle bottom-left overlay on the media */
  .bundle-tag {
    position: absolute;
    bottom: 12px; left: 12px;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.02em;
    padding: 5px 10px;
    border-radius: var(--r-full);
    color: var(--text);
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    display: inline-flex; align-items: center; gap: 5px;
  }
  .bundle-tag::before {
    content: '';
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--success);
  }
  .shop[data-theme="dark"] .bundle-tag {
    background: rgba(26, 23, 38, 0.9);
  }

  /* X% OFF pill — inline next to title, driven by SDK */
  .bundle-discount {
    position: absolute;
    top: 20px; right: 20px;
    display: flex; flex-direction: column; align-items: flex-end;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.03em;

    color: var(--accent);
    font-variant-numeric: tabular-nums;
  }
  .bundle-discount:empty { display: none; }
  .bundle-discount:not(:empty)::after {
    content: 'OFF';
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 3px;
  }

  /* ─── Body — flex column so CTA sticks to card bottom ─── */
  .bundle-body {
    position: relative;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    flex: 1;
  }
  .bundle-title {
    font-size: 20px; font-weight: 700;
    letter-spacing: -0.015em;
    margin: 0;
    line-height: 1.15;
    padding-right: 72px;
  }
  .bundle-subtitle {
    font-size: 13px;
    color: var(--text-muted);
    margin: -10px 0 0;
  }

  /* ─── Price ───────────────────────────────────────────── */
  .price {
    display: grid; gap: 4px;

    border-top: 1px solid var(--border);

    letter-spacing: -0.03em;
